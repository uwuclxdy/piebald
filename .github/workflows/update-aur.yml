name: Update AUR Package

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for new version
        id: version
        run: |
          LATEST=$(curl -sL https://api.github.com/repos/Piebald-AI/piebald/releases/latest | jq -r .tag_name | sed 's/^v//')
          CURRENT=$(grep '^pkgver=' PKGBUILD | cut -d= -f2)
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          if [ "$LATEST" != "$CURRENT" ]; then
            echo "updated=true" >> "$GITHUB_OUTPUT"
          else
            echo "updated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update PKGBUILD
        if: steps.version.outputs.updated == 'true'
        env:
          NEW_VER: ${{ steps.version.outputs.latest }}
        run: |
          DEB_URL="https://github.com/Piebald-AI/piebald/releases/download/v${NEW_VER}/Piebald_${NEW_VER}_amd64.deb"
          SHA256=$(curl -sL "$DEB_URL" | sha256sum | cut -d' ' -f1)
          sed -i "s/^pkgver=.*/pkgver=${NEW_VER}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=('${SHA256}')/" PKGBUILD

      - name: Generate .SRCINFO
        if: steps.version.outputs.updated == 'true'
        run: |
          docker run --rm -v "$PWD:/pkg" archlinux:base-devel bash -c '
            useradd -m builder
            cp /pkg/PKGBUILD /home/builder/
            chown builder:builder /home/builder/PKGBUILD
            su builder -c "cd /home/builder && makepkg --printsrcinfo" > /pkg/.SRCINFO
          '

      - name: Commit and push changes
        if: steps.version.outputs.updated == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD .SRCINFO
          git commit -m "Update to v${{ steps.version.outputs.latest }}"
          git push

      - name: Publish to AUR
        if: steps.version.outputs.updated == 'true'
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.1
        with:
          pkgname: piebald-bin
          pkgbuild: ./PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: Update to v${{ steps.version.outputs.latest }}
