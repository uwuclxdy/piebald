name: Update AUR Package

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check for new version
        id: version
        run: |
          LATEST=$(curl -sL https://api.github.com/repos/Piebald-AI/piebald-issues/releases/latest | jq -r '.tag_name // empty' | sed 's/^v//')
          if [ -z "$LATEST" ]; then
            echo "::warning::Could not fetch latest version from GitHub API"
            echo "updated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CURRENT=$(grep '^pkgver=' PKGBUILD | cut -d= -f2)
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          if [ "$LATEST" != "$CURRENT" ]; then
            echo "updated=true" >> "$GITHUB_OUTPUT"
          else
            echo "updated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update PKGBUILD
        if: steps.version.outputs.updated == 'true'
        env:
          NEW_VER: ${{ steps.version.outputs.latest }}
        run: |
          DEB_URL="https://github.com/Piebald-AI/piebald-issues/releases/download/v${NEW_VER}/Piebald_${NEW_VER}_amd64.deb"
          HTTP_CODE=$(curl -sL -o /tmp/piebald.deb -w '%{http_code}' "$DEB_URL")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Failed to download .deb (HTTP $HTTP_CODE): $DEB_URL"
            exit 1
          fi
          SHA256=$(sha256sum /tmp/piebald.deb | cut -d' ' -f1)
          sed -i "s/^pkgver=.*/pkgver=${NEW_VER}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=('${SHA256}')/" PKGBUILD

      - name: Generate .SRCINFO
        if: steps.version.outputs.updated == 'true'
        run: |
          docker run --rm -v "$PWD:/pkg" archlinux:base-devel bash -c '
            useradd -m builder
            cp /pkg/PKGBUILD /home/builder/
            chown builder:builder /home/builder/PKGBUILD
            su builder -c "cd /home/builder && makepkg --printsrcinfo" > /pkg/.SRCINFO
          '

      - name: Commit and push changes
        if: steps.version.outputs.updated == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD .SRCINFO
          git commit -m "Update to v${{ steps.version.outputs.latest }}"
          git push

      - name: Publish to AUR
        if: steps.version.outputs.updated == 'true'
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          AUR_USERNAME: ${{ secrets.AUR_USERNAME }}
          AUR_EMAIL: ${{ secrets.AUR_EMAIL }}
        run: |
          mkdir -p ~/.ssh
          echo "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan -t rsa,ecdsa,ed25519 aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null
          cat >> ~/.ssh/config <<'SSHEOF'
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            User aur
          SSHEOF
          git clone ssh://aur@aur.archlinux.org/piebald-bin.git /tmp/aur-repo
          cp PKGBUILD .SRCINFO /tmp/aur-repo/
          cd /tmp/aur-repo
          git config user.name "$AUR_USERNAME"
          git config user.email "$AUR_EMAIL"
          git add PKGBUILD .SRCINFO
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update to v${{ steps.version.outputs.latest }}"
          git push
